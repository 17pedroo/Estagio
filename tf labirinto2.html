<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0" />
  <title>Transportes Figueiredo — Labirinto</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #1a252f;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── HUD ── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: calc(12px + env(safe-area-inset-top)) 18px 12px;
      background: rgba(0,0,0,.6);
      color: #ecf0f1;
      font-size: 15px; font-weight: 600;
      z-index: 10;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .hud-group {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    #hud span { display: flex; align-items: center; gap: 6px; }
    #hud .icon { font-size: 18px; }
    .hud-btn {
      padding: 8px 12px;
      border: 0;
      border-radius: 999px;
      background: rgba(230,126,34,.18);
      color: #f6c38b;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
    }
    .hud-btn:active { transform: scale(.97); }

    /* ── Canvas ── */
    #gameCanvas { display: block; position: absolute; top: 0; left: 0; pointer-events: none; }

    /* ── Overlays ── */
    .overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: calc(24px + env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom));
      background: rgba(26,37,47,.94);
      z-index: 50;
      transition: opacity .3s;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; }

    .overlay h1 {
      color: #e67e22;
      font-size: 26px;
      margin-bottom: 8px;
      text-align: center;
    }
    .overlay p {
      color: #bdc3c7;
      font-size: 14px;
      text-align: center;
      max-width: min(300px, 90vw);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .overlay .btn {
      padding: 14px 32px;
      font-size: 16px; font-weight: 700;
      color: #fff;
      background: #e67e22;
      border: none; border-radius: 10px;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 4px 16px rgba(230,126,34,.4);
      transition: transform .1s;
    }
    .overlay .btn:active { transform: scale(.96); }

    .mission-score {
      color: #2ecc71;
      font-size: 38px; font-weight: 800;
      margin-bottom: 4px;
    }
    .mission-bonus {
      color: #3498db;
      font-size: 15px;
      margin-bottom: 20px;
    }

    #controlHint {
      position: fixed; bottom: calc(16px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,.4); font-size: 12px; text-align: center;
      width: calc(100% - 32px);
      z-index: 10;
    }

    @media (max-width: 480px) {
      #hud {
        justify-content: center;
        padding-left: 12px;
        padding-right: 12px;
        font-size: 14px;
      }

      .hud-group {
        justify-content: center;
      }

      .overlay h1 { font-size: 22px; }

      .overlay .btn {
        width: min(100%, 320px);
        padding: 14px 20px;
      }
    }
  </style>
</head>
<body>

<div id="hud">
  <div class="hud-group">
    <span><span class="icon">📦</span> Nível <b id="levelDisplay">1</b></span>
    <span><span class="icon">⭐</span> <b id="scoreDisplay">0</b> pts</span>
  </div>
  <div class="hud-group">
    <span><span class="icon">⏱</span> <b id="timerDisplay">0.0s</b></span>
    <span><span class="icon">🏆</span> <b id="bestDisplay">0</b></span>
    <button class="hud-btn" id="restartBtn" type="button">↻ Nível</button>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="startOverlay" class="overlay">
  <h1>🚛 Transportes Figueiredo</h1>
  <p>Arrasta o dedo no ecrã ou inclina o telemóvel para guiar o camião até ao galpão.</p>
  <button class="btn" id="startBtn" type="button">🎮 COMEÇAR ENTREGA</button>
</div>

<div id="missionOverlay" class="overlay hidden">
  <h1>✅ Missão Cumprida!</h1>
  <div class="mission-score" id="missionPts">+100</div>
  <div class="mission-bonus" id="missionBonus">Bónus de tempo: +50</div>
  <button class="btn" id="nextBtn" type="button">Próximo Nível ➜</button>
</div>

<div id="controlHint">Desktop: ⬆⬇⬅➜ | Mobile: Swipe ou inclinação</div>

<script>
/* ═══════════════════════════════════════════════════════
   TRANSPORTES FIGUEIREDO — MAZE GAME (Mobile Optimized)
   ═══════════════════════════════════════════════════════ */

// ── Config ──
const WALL_COLOR   = '#95a5a6';
const WALL_WIDTH   = 3;
const BG_COLOR     = '#2c3e50';
const GOAL_COLOR   = '#27ae60';
const PLAYER_COLOR = '#e67e22';
const PLAYER_DIR_COLOR = '#d35400';
const THRESHOLD    = 10;   // inclinação mínima (graus)
const SWIPE_THRESH = 25;   // swipe mínimo (px)
const BASE_MOVE_DELAY = 110;
const MIN_MOVE_DELAY  = 72;
const MOVE_DELAY_STEP = 4;
const MOBILE_MIN_CELL = 26;
const COLLISION_FLASH_MS = 140;
const BEST_SCORE_KEY = 'transportes-figueiredo-best-score';
const CONTROL_KEYS = new Set(['arrowup', 'arrowdown', 'arrowleft', 'arrowright', 'w', 'a', 's', 'd']);

// ── State ──
let level        = 1;
let score        = 0;
let cols         = 12;
let rows         = 10;
let cellW, cellH;
let maze         = [];
let playerX      = 0;
let playerY      = 0;
let goalX, goalY;
let lastMoveTime = 0;
let startTime    = 0;
let tiltGamma    = 0;
let tiltBeta     = 0;
let currentMoveDelay = BASE_MOVE_DELAY;
let currentParTime   = 20;
let currentBasePoints = 100;
let currentLevelTime = 0;
let levelPathLength  = 0;
let collisionFlashUntil = 0;
let missionRevealTimeout = 0;
let gameActive   = false;
let sensorsOk    = false;
let hasGameStarted = false;
let gameLoopStarted = false;
let bestScore    = loadBestScore();

// ── Touch State ──
let touchStartX = 0, touchStartY = 0;
let isTouching  = false;
const keysDown  = {};
const keyPressedAt = {};

// ── DOM ──
const canvas         = document.getElementById('gameCanvas');
const ctx            = canvas.getContext('2d');
const hudLevel       = document.getElementById('levelDisplay');
const hudScore       = document.getElementById('scoreDisplay');
const hudTimer       = document.getElementById('timerDisplay');
const hudBest        = document.getElementById('bestDisplay');
const startOverlay   = document.getElementById('startOverlay');
const missionOverlay = document.getElementById('missionOverlay');
const missionPts     = document.getElementById('missionPts');
const missionBonus   = document.getElementById('missionBonus');
const startBtn       = document.getElementById('startBtn');
const nextBtn        = document.getElementById('nextBtn');
const restartBtn     = document.getElementById('restartBtn');
const controlHint    = document.getElementById('controlHint');

function loadBestScore() {
  try {
    return Number(localStorage.getItem(BEST_SCORE_KEY) || 0);
  } catch (error) {
    console.warn('Não foi possível ler o recorde.', error);
    return 0;
  }
}

function saveBestScore() {
  hudBest.textContent = bestScore;
  try {
    localStorage.setItem(BEST_SCORE_KEY, String(bestScore));
  } catch (error) {
    console.warn('Não foi possível guardar o recorde.', error);
  }
}

function normalizeKey(key) {
  return key.length === 1 ? key.toLowerCase() : key.toLowerCase();
}

function isControlKey(key) {
  return CONTROL_KEYS.has(normalizeKey(key));
}

function updateHud() {
  hudLevel.textContent = level;
  hudScore.textContent = score;
  hudTimer.textContent = `${currentLevelTime.toFixed(1)}s`;
  hudBest.textContent = bestScore;
}

function isTouchDevice() {
  return window.matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window;
}

function updateControlHint() {
  if (sensorsOk) {
    controlHint.textContent = 'Incline ou arraste para mover · ↻ reinicia o nível';
    return;
  }

  controlHint.textContent = isTouchDevice()
    ? 'Arraste o dedo para mover · ↻ reinicia o nível'
    : 'Use as setas ou WASD · R reinicia';
}

function getLevelGridSize(currentLevel) {
  const desiredCols = 12 + (currentLevel - 1) * 2;
  const desiredRows = 10 + (currentLevel - 1) * 2;
  const hudH = document.getElementById('hud').getBoundingClientRect().height || 46;
  const minCellSize = window.innerWidth <= 480 ? MOBILE_MIN_CELL : 24;
  const maxCols = Math.max(8, Math.floor(window.innerWidth / minCellSize));
  const maxRows = Math.max(8, Math.floor((window.innerHeight - hudH) / minCellSize));

  return {
    cols: Math.min(desiredCols, maxCols),
    rows: Math.min(desiredRows, maxRows)
  };
}

// ═══════════════════════════════════════════════════════
//  MAZE GENERATION (DFS Backtracking)
// ═══════════════════════════════════════════════════════
function generateMaze(r, c) {
  const grid = [];
  for (let i = 0; i < r; i++) {
    grid[i] = [];
    for (let j = 0; j < c; j++) {
      grid[i][j] = { top: true, right: true, bottom: true, left: true, visited: false };
    }
  }

  const stack = [];
  let cx = 0, cy = 0;
  grid[cy][cx].visited = true;
  stack.push([cx, cy]);

  const dirs = [
    [0, -1, 'top',    'bottom'],
    [1,  0, 'right',  'left'],
    [0,  1, 'bottom', 'top'],
    [-1, 0, 'left',   'right']
  ];

  while (stack.length > 0) {
    const neighbours = dirs
      .map(([dx, dy, wall, opp]) => [cx + dx, cy + dy, wall, opp])
      .filter(([nx, ny]) => nx >= 0 && nx < c && ny >= 0 && ny < r && !grid[ny][nx].visited);

    if (neighbours.length > 0) {
      const [nx, ny, wall, opp] = neighbours[Math.floor(Math.random() * neighbours.length)];
      grid[cy][cx][wall] = false;
      grid[ny][nx][opp]  = false;
      grid[ny][nx].visited = true;
      stack.push([cx, cy]);
      cx = nx; cy = ny;
    } else {
      [cx, cy] = stack.pop();
    }
  }
  return grid;
}

// ═══════════════════════════════════════════════════════
//  CANVAS & RESIZE
// ═══════════════════════════════════════════════════════
function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width  = `${window.innerWidth}px`;
  canvas.style.height = `${window.innerHeight}px`;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);

  const hudH = document.getElementById('hud').getBoundingClientRect().height || 46;
  const availW = window.innerWidth;
  const availH = window.innerHeight - hudH;
  cellW = Math.floor(availW / cols);
  cellH = Math.floor(availH / rows);
  const cellSize = Math.min(cellW, cellH);
  cellW = cellH = cellSize;
}

// ═══════════════════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════════════════
function drawMaze() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  const hitActive = Date.now() < collisionFlashUntil;
  ctx.fillStyle = hitActive ? '#314551' : BG_COLOR;
  ctx.fillRect(0, 0, w, h);

  if (!maze.length || !maze[0] || maze.length !== rows || maze[0].length !== cols) {
    return;
  }

  const offsetX = (w - cols * cellW) / 2;
  const hudH = document.getElementById('hud').getBoundingClientRect().height || 46;
  const offsetY = hudH + (h - hudH - rows * cellH) / 2;

  ctx.save();
  ctx.translate(offsetX, offsetY);

  // Paredes
  ctx.strokeStyle = hitActive ? '#e74c3c' : WALL_COLOR;
  ctx.lineWidth   = WALL_WIDTH;
  ctx.lineCap     = 'round';

  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const cell = maze[y][x];
      const px = x * cellW;
      const py = y * cellH;

      if (cell.top)    { ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px + cellW, py); ctx.stroke(); }
      if (cell.right)  { ctx.beginPath(); ctx.moveTo(px + cellW, py); ctx.lineTo(px + cellW, py + cellH); ctx.stroke(); }
      if (cell.bottom) { ctx.beginPath(); ctx.moveTo(px, py + cellH); ctx.lineTo(px + cellW, py + cellH); ctx.stroke(); }
      if (cell.left)   { ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, py + cellH); ctx.stroke(); }
    }
  }

  ctx.strokeStyle = hitActive ? '#e74c3c' : WALL_COLOR;
  ctx.lineWidth   = WALL_WIDTH + 2;
  ctx.strokeRect(0, 0, cols * cellW, rows * cellH);

  if (hitActive) {
    ctx.fillStyle = 'rgba(231,76,60,.08)';
    ctx.fillRect(0, 0, cols * cellW, rows * cellH);
  }

  // Objetivo
  const gx = goalX * cellW + cellW * 0.15;
  const gy = goalY * cellH + cellH * 0.15;
  const gs = cellW * 0.7;
  ctx.fillStyle = GOAL_COLOR;
  ctx.shadowColor = 'rgba(39,174,96,.5)';
  ctx.shadowBlur  = 12;
  roundRect(ctx, gx, gy, gs, gs, 3);
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#1e8449';
  ctx.beginPath();
  ctx.moveTo(gx, gy);
  ctx.lineTo(gx + gs/2, gy - gs*0.15);
  ctx.lineTo(gx + gs, gy);
  ctx.closePath();
  ctx.fill();

  // Player
  const pw = cellW * 0.6;
  const ph = cellH * 0.6;
  const ppx = playerX * cellW + (cellW - pw) / 2;
  const ppy = playerY * cellH + (cellH - ph) / 2;

  ctx.fillStyle = PLAYER_COLOR;
  ctx.shadowColor = 'rgba(230,126,34,.4)';
  ctx.shadowBlur  = 8;
  roundRect(ctx, ppx, ppy, pw, ph, 4);
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.fillStyle = PLAYER_DIR_COLOR;
  const winH = ph * 0.25;
  const winY = ppy + ph * 0.12;
  roundRect(ctx, ppx + pw*0.15, winY, pw*0.7, winH, 2);
  ctx.fill();

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function getOpenNeighbors(x, y) {
  const cell = maze[y][x];
  const neighbors = [];

  if (!cell.top && y > 0) neighbors.push([x, y - 1]);
  if (!cell.right && x < cols - 1) neighbors.push([x + 1, y]);
  if (!cell.bottom && y < rows - 1) neighbors.push([x, y + 1]);
  if (!cell.left && x > 0) neighbors.push([x - 1, y]);

  return neighbors;
}

function findFarthestCell(startX, startY) {
  const distances = Array.from({ length: rows }, () => Array(cols).fill(-1));
  const queue = [[startX, startY]];
  let queueIndex = 0;
  let farthest = { x: startX, y: startY, distance: 0 };

  distances[startY][startX] = 0;

  while (queueIndex < queue.length) {
    const [x, y] = queue[queueIndex++];
    const distance = distances[y][x];

    if (distance > farthest.distance) {
      farthest = { x, y, distance };
    }

    for (const [nextX, nextY] of getOpenNeighbors(x, y)) {
      if (distances[nextY][nextX] !== -1) continue;
      distances[nextY][nextX] = distance + 1;
      queue.push([nextX, nextY]);
    }
  }

  return farthest;
}

function findMazeEndpoints() {
  const start = findFarthestCell(0, 0);
  const goal = findFarthestCell(start.x, start.y);

  return {
    startX: start.x,
    startY: start.y,
    goalX: goal.x,
    goalY: goal.y,
    distance: goal.distance
  };
}

function getLevelConfig(currentLevel, pathLength) {
  return {
    moveDelay: Math.max(MIN_MOVE_DELAY, BASE_MOVE_DELAY - (currentLevel - 1) * MOVE_DELAY_STEP),
    parTime: Math.max(15, Math.round(pathLength * 0.85 + currentLevel * 2.5)),
    basePoints: 100 + currentLevel * 15 + pathLength * 2
  };
}

function getAxisDirection(negativeKeys, positiveKeys) {
  const negativePressedAt = negativeKeys.reduce((latest, key) => {
    return keysDown[key] ? Math.max(latest, keyPressedAt[key] || 0) : latest;
  }, 0);
  const positivePressedAt = positiveKeys.reduce((latest, key) => {
    return keysDown[key] ? Math.max(latest, keyPressedAt[key] || 0) : latest;
  }, 0);

  if (!negativePressedAt && !positivePressedAt) {
    return { value: 0, pressedAt: 0 };
  }

  if (negativePressedAt === positivePressedAt) {
    return { value: negativePressedAt ? -1 : 1, pressedAt: Math.max(negativePressedAt, positivePressedAt) };
  }

  return negativePressedAt > positivePressedAt
    ? { value: -1, pressedAt: negativePressedAt }
    : { value: 1, pressedAt: positivePressedAt };
}

function getKeyboardDirection() {
  const horizontal = getAxisDirection(['arrowleft', 'a'], ['arrowright', 'd']);
  const vertical = getAxisDirection(['arrowup', 'w'], ['arrowdown', 's']);

  if (horizontal.value && vertical.value) {
    return horizontal.pressedAt > vertical.pressedAt
      ? { dx: horizontal.value, dy: 0 }
      : { dx: 0, dy: vertical.value };
  }

  return { dx: horizontal.value, dy: vertical.value };
}

function getTiltDirection() {
  const horizontal = Math.abs(tiltGamma) > THRESHOLD ? Math.sign(tiltGamma) : 0;
  const vertical = Math.abs(tiltBeta) > THRESHOLD ? Math.sign(tiltBeta) : 0;

  if (horizontal && vertical) {
    return Math.abs(tiltGamma) > Math.abs(tiltBeta)
      ? { dx: horizontal, dy: 0 }
      : { dx: 0, dy: vertical };
  }

  return { dx: horizontal, dy: vertical };
}

function syncBestScore() {
  if (score <= bestScore) {
    updateHud();
    return;
  }

  bestScore = score;
  saveBestScore();
  updateHud();
}

function clearMissionOverlay() {
  window.clearTimeout(missionRevealTimeout);
  missionOverlay.classList.add('hidden');
}

function triggerCollisionFeedback(now) {
  collisionFlashUntil = now + COLLISION_FLASH_MS;
  if (navigator.vibrate) navigator.vibrate(18);
  drawMaze();
}

function normalizeDirection(dx, dy) {
  let nextDx = Math.sign(dx);
  let nextDy = Math.sign(dy);

  if (nextDx && nextDy) {
    if (Math.abs(dx) > Math.abs(dy)) {
      nextDy = 0;
    } else {
      nextDx = 0;
    }
  }

  return { dx: nextDx, dy: nextDy };
}

// ═══════════════════════════════════════════════════════
//  MOVEMENT & COLLISION
// ═══════════════════════════════════════════════════════
function canMove(dx, dy) {
  if (!dx && !dy) return false;
  const cell = maze[playerY][playerX];
  if (dx ===  1 && cell.right)  return false;
  if (dx === -1 && cell.left)   return false;
  if (dy ===  1 && cell.bottom) return false;
  if (dy === -1 && cell.top)    return false;
  return (playerX + dx >= 0 && playerX + dx < cols && playerY + dy >= 0 && playerY + dy < rows);
}

function movePlayer(dx, dy, options = {}) {
  const { showCollisionFeedback = true } = options;

  if (!gameActive) return;

  const nextDirection = normalizeDirection(dx, dy);
  dx = nextDirection.dx;
  dy = nextDirection.dy;
  if (!dx && !dy) return;

  const now = Date.now();
  if (now - lastMoveTime < currentMoveDelay) return;

  if (canMove(dx, dy)) {
    playerX += dx;
    playerY += dy;
    lastMoveTime = now;
    if (navigator.vibrate) navigator.vibrate(12);
    drawMaze();
    checkGoal();
    return;
  }

  lastMoveTime = now;
  if (showCollisionFeedback) {
    triggerCollisionFeedback(now);
  }
}

function checkGoal() {
  if (playerX === goalX && playerY === goalY) {
    gameActive = false;
    const elapsed = currentLevelTime || (Date.now() - startTime) / 1000;
    const timeBonus = Math.max(0, Math.round((currentParTime - elapsed) * 5));
    const totalPts  = currentBasePoints + timeBonus;
    score += totalPts;
    missionPts.textContent   = '+' + totalPts;
    missionBonus.textContent = `Tempo: ${elapsed.toFixed(1)}s / alvo ${currentParTime}s · bónus +${timeBonus}`;
    syncBestScore();
    missionRevealTimeout = window.setTimeout(() => missionOverlay.classList.remove('hidden'), 250);
  }
}

// ═══════════════════════════════════════════════════════
//  INPUT: TOUCH (SWIPE), KEYBOARD, SENSORS
// ═══════════════════════════════════════════════════════
window.addEventListener('keydown', (event) => {
  const normalizedKey = normalizeKey(event.key);

  if (isControlKey(normalizedKey)) {
    keysDown[normalizedKey] = true;
    keyPressedAt[normalizedKey] = Date.now();
    event.preventDefault();
  }
});

window.addEventListener('keyup', (event) => {
  const normalizedKey = normalizeKey(event.key);
  if (isControlKey(normalizedKey)) {
    keysDown[normalizedKey] = false;
  }
});

// Touch Swipe
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  isTouching = true;
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!isTouching || !gameActive) return;
  
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;

  if (Math.abs(dx) > SWIPE_THRESH || Math.abs(dy) > SWIPE_THRESH) {
    if (Math.abs(dx) > Math.abs(dy)) {
      movePlayer(dx > 0 ? 1 : -1, 0);
    } else {
      movePlayer(0, dy > 0 ? 1 : -1);
    }
    // Reset para permitir swipe contínuo
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }
}, { passive: false });

canvas.addEventListener('touchend', () => { isTouching = false; });

// Sensor Orientation
function onOrientation(e) {
  tiltGamma = e.gamma || 0;
  tiltBeta  = e.beta  || 0;
}

function initSensors() {
  sensorsOk = false;

  if (!window.isSecureContext) {
    updateControlHint();
    return;
  }

  if (typeof DeviceOrientationEvent === 'undefined') {
    console.warn('API DeviceOrientation não suportada.');
    updateControlHint();
    return;
  }
  
  // iOS 13+ requer permissão explícita
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(resp => {
        if (resp === 'granted') {
          window.addEventListener('deviceorientation', onOrientation);
          sensorsOk = true;
        }
        updateControlHint();
      })
      .catch(err => {
        console.error(err);
        updateControlHint();
      });
  } else {
    // Android / Desktop
    window.addEventListener('deviceorientation', onOrientation);
    sensorsOk = true;
    updateControlHint();
  }
}

function startGame(event) {
  if (event) {
    event.preventDefault();
  }

  if (hasGameStarted) {
    return;
  }

  hasGameStarted = true;
  canvas.style.pointerEvents = 'auto';
  initSensors();
  startOverlay.classList.add('hidden');
  startLevel();

  if (!gameLoopStarted) {
    gameLoopStarted = true;
    gameLoop();
  }
}

function restartLevel() {
  if (!hasGameStarted) {
    startGame();
    return;
  }

  clearMissionOverlay();
  startLevel();
}

// Game Loop (para teclado e sensores)
function gameLoop() {
  if (gameActive) {
    currentLevelTime = (Date.now() - startTime) / 1000;
    const keyboardDirection = getKeyboardDirection();

    if (keyboardDirection.dx || keyboardDirection.dy) {
      movePlayer(keyboardDirection.dx, keyboardDirection.dy);
    } else if (sensorsOk) {
      const tiltDirection = getTiltDirection();
      if (tiltDirection.dx || tiltDirection.dy) {
        movePlayer(tiltDirection.dx, tiltDirection.dy, { showCollisionFeedback: false });
      }
    }
  }

  updateHud();
  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════════════
//  LEVEL MANAGEMENT & INIT
// ═══════════════════════════════════════════════════════
function startLevel() {
  clearMissionOverlay();
  const gridSize = getLevelGridSize(level);
  cols = gridSize.cols;
  rows = gridSize.rows;
  maze = generateMaze(rows, cols);

  const endpoints = findMazeEndpoints();
  const levelConfig = getLevelConfig(level, endpoints.distance);

  playerX = endpoints.startX;
  playerY = endpoints.startY;
  goalX = endpoints.goalX;
  goalY = endpoints.goalY;
  levelPathLength = endpoints.distance;
  currentMoveDelay = levelConfig.moveDelay;
  currentParTime = levelConfig.parTime;
  currentBasePoints = levelConfig.basePoints;
  currentLevelTime = 0;
  lastMoveTime = 0;
  collisionFlashUntil = 0;
  resizeCanvas();
  drawMaze();
  gameActive = true;
  startTime = Date.now();
  updateHud();
  updateControlHint();
}

startBtn.addEventListener('click', startGame);
startBtn.addEventListener('pointerdown', startGame);
startBtn.addEventListener('touchstart', startGame, { passive: false });
startOverlay.addEventListener('pointerdown', startGame);
startOverlay.addEventListener('touchstart', startGame, { passive: false });
restartBtn.addEventListener('click', restartLevel);
window.addEventListener('keydown', (event) => {
  if (!startOverlay.classList.contains('hidden') && (event.key === 'Enter' || event.key === ' ')) {
    startGame(event);
    return;
  }

  if (normalizeKey(event.key) === 'r' && hasGameStarted) {
    event.preventDefault();
    restartLevel();
  }
});

nextBtn.addEventListener('click', () => { level++; startLevel(); });
window.addEventListener('resize', () => { resizeCanvas(); drawMaze(); });

// Init
resizeCanvas();
drawMaze();
saveBestScore();
updateHud();
updateControlHint();
</script>
